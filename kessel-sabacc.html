<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kessel Sabacc</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; }
    .table { display:flex; gap:1rem; margin-top:1rem; flex-wrap:wrap; }
    .player, .controls, .log { border:1px solid #555; padding:0.5rem; border-radius:4px; }
    .player { min-width:200px; }
    button { margin:0.25rem 0; }
    .active { border-color:#0f0; }
  </style>
</head>
<body>
  <h1>Kessel Sabacc (Prototype)</h1>
  <div>
    <label>Players: 
      <select id="playerCount">
        <option>2</option>
        <option>3</option>
        <option>4</option>
      </select>
    </label>
    <label>Chips per player:
      <input id="chipsPerPlayer" type="number" value="6" min="4" max="8" />
    </label>
    <button id="startGame">Start Game</button>
  </div>

  <div class="table">
    <div id="players"></div>
    <div class="controls">
      <h3>Turn Controls</h3>
      <p id="roundInfo"></p>
      <p id="turnInfo"></p>
      <button id="drawBtn" disabled>Draw</button>
      <button id="standBtn" disabled>Stand</button>
      <button id="revealBtn" disabled>Reveal Round</button>
    </div>
    <div class="log">
      <h3>Log</h3>
      <div id="logBox" style="max-height:300px; overflow:auto; font-size:0.9rem;"></div>
    </div>
  </div>

  <script>
    // --- Game Data Structures ---
    const FAMILIES = ["Sand", "Blood"];
    const NUMBER_VALUES = [1, 2, 3, 4, 5, 6];
    const SPECIAL_SYLOP = "Sylop";
    const SPECIAL_IMPOSTER = "Imposter";

    let players = [];
    let sandDeck = [];
    let bloodDeck = [];
    let discardSand = [];
    let discardBlood = [];
    let currentPlayerIndex = 0;
    let currentTurn = 1;
    const MAX_TURNS = 3;
    let gameActive = false;

    const playersDiv = document.getElementById("players");
    const roundInfo = document.getElementById("roundInfo");
    const turnInfo = document.getElementById("turnInfo");
    const drawBtn = document.getElementById("drawBtn");
    const standBtn = document.getElementById("standBtn");
    const revealBtn = document.getElementById("revealBtn");
    const logBox = document.getElementById("logBox");

    function log(msg) {
      const p = document.createElement("p");
      p.textContent = msg;
      logBox.appendChild(p);
      logBox.scrollTop = logBox.scrollHeight;
    }

    // --- Deck & Card Helpers ---
    function createDeck(family) {
      const deck = [];
      // 3 cards for each value per family
      NUMBER_VALUES.forEach(v => {
        for (let i = 0; i < 3; i++) {
          deck.push({ family, type: "number", value: v });
        }
      });
      // 1 Sylop and 1 Imposter per family (simple choice)
      deck.push({ family, type: SPECIAL_SYLOP, value: null });
      deck.push({ family, type: SPECIAL_IMPOSTER, value: null });
      return deck;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function drawFromDeck(deck, discard) {
      if (deck.length === 0) {
        // reshuffle discard into deck
        deck.push(...discard);
        discard.length = 0;
        shuffle(deck);
      }
      return deck.pop();
    }

    // --- Player & UI ---
    function createPlayers(count, chips) {
      players = [];
      for (let i = 0; i < count; i++) {
        players.push({
          id: i,
          name: "Player " + (i + 1),
          chips,
          hand: { Sand: null, Blood: null },
          stood: false,
          busted: false
        });
      }
    }

    function dealInitialHands() {
      players.forEach(p => {
        p.hand.Sand = drawFromDeck(sandDeck, discardSand);
        p.hand.Blood = drawFromDeck(bloodDeck, discardBlood);
      });
    }

    function renderPlayers() {
      playersDiv.innerHTML = "";
      players.forEach((p, idx) => {
        const div = document.createElement("div");
        div.className = "player" + (idx === currentPlayerIndex ? " active" : "");
        div.innerHTML = `
          <h3>${p.name}</h3>
          <p>Chips: ${p.chips}</p>
          <p>Hand:
            <br>Sand: ${cardToString(p.hand.Sand)}
            <br>Blood: ${cardToString(p.hand.Blood)}
          </p>
          <p>Status: ${p.stood ? "Standing" : "Playing"}</p>
        `;
        playersDiv.appendChild(div);
      });
    }

    function cardToString(card) {
      if (!card) return "-";
      if (card.type === "number") return `${card.family} ${card.value}`;
      return `${card.family} ${card.type}`;
    }

    // --- Game Flow ---
    function startGame() {
      const count = parseInt(document.getElementById("playerCount").value, 10);
      const chips = parseInt(document.getElementById("chipsPerPlayer").value, 10);

      sandDeck = createDeck("Sand");
      bloodDeck = createDeck("Blood");
      shuffle(sandDeck);
      shuffle(bloodDeck);
      discardSand = [];
      discardBlood = [];

      createPlayers(count, chips);
      dealInitialHands();

      currentPlayerIndex = 0;
      currentTurn = 1;
      gameActive = true;

      drawBtn.disabled = false;
      standBtn.disabled = false;
      revealBtn.disabled = true;

      logBox.innerHTML = "";
      log("New game started with " + count + " players.");
      updateStatus();
    }

    function updateStatus() {
      roundInfo.textContent = `Round in progress – Turn ${currentTurn} of ${MAX_TURNS}`;
      turnInfo.textContent = `Current player: ${players[currentPlayerIndex].name}`;
      renderPlayers();
    }

    function nextPlayer() {
      do {
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
      } while (players[currentPlayerIndex].busted);

      // if all players have stood or we completed 3 turns, enable reveal
      const allStood = players.every(p => p.stood || p.busted);
      if (allStood || currentTurn > MAX_TURNS) {
        drawBtn.disabled = true;
        standBtn.disabled = true;
        revealBtn.disabled = false;
        turnInfo.textContent = "All players done. Reveal the hands.";
      } else {
        updateStatus();
      }
    }

    function onDraw() {
      const p = players[currentPlayerIndex];
      if (p.stood || p.busted) {
        nextPlayer();
        return;
      }
      if (p.chips <= 0) {
        log(`${p.name} has no chips to draw.`);
        nextPlayer();
        return;
      }

      // pay 1 chip
      p.chips -= 1;

      // choose family randomly for this prototype
      const family = Math.random() < 0.5 ? "Sand" : "Blood";
      const deck = family === "Sand" ? sandDeck : bloodDeck;
      const discard = family === "Sand" ? discardSand : discardBlood;

      const drawn = drawFromDeck(deck, discard);
      log(`${p.name} draws a ${cardToString(drawn)} from ${family} deck.`);

      // simple choice: keep the better card (closer to 0 by absolute value)
      const current = p.hand[family];
      const keepDrawn = chooseBetterCard(current, drawn);
      if (keepDrawn === drawn) {
        if (current) discard.push(current);
        p.hand[family] = drawn;
        log(`${p.name} keeps the drawn ${cardToString(drawn)}.`);
      } else {
        discard.push(drawn);
        log(`${p.name} discards the drawn ${cardToString(drawn)}.`);
      }

      // move to next player or next turn
      if (currentPlayerIndex === players.length - 1) {
        currentTurn++;
      }
      nextPlayer();
    }

    function chooseBetterCard(oldCard, newCard) {
      // very simple heuristic: prefer Sylop, then Imposter, then smaller number
      if (!oldCard) return newCard;
      if (newCard.type === SPECIAL_SYLOP && oldCard.type !== SPECIAL_SYLOP) return newCard;
      if (oldCard.type === SPECIAL_SYLOP && newCard.type !== SPECIAL_SYLOP) return oldCard;
      if (newCard.type === SPECIAL_IMPOSTER && oldCard.type !== SPECIAL_IMPOSTER) return newCard;
      if (oldCard.type === SPECIAL_IMPOSTER && newCard.type !== SPECIAL_IMPOSTER) return oldCard;
      if (newCard.type === "number" && oldCard.type === "number") {
        return Math.abs(newCard.value) <= Math.abs(oldCard.value) ? newCard : oldCard;
      }
      return newCard; // fallback
    }

    function onStand() {
      const p = players[currentPlayerIndex];
      p.stood = true;
      log(`${p.name} stands.`);
      if (currentPlayerIndex === players.length - 1) {
        currentTurn++;
      }
      nextPlayer();
    }

    function onReveal() {
      log("Revealing hands...");
      // resolve imposters (simple d6)
      players.forEach(p => {
        ["Sand", "Blood"].forEach(fam => {
          const c = p.hand[fam];
          if (c && c.type === SPECIAL_IMPOSTER) {
            const roll = Math.floor(Math.random() * 6) + 1;
            c.type = "number";
            c.value = roll;
            log(`${p.name}'s Imposter in ${fam} becomes ${roll}.`);
          }
        });
      });

      // compute hand values (sum, closer to 0 is better)
      const results = players.map(p => {
        const v1 = cardNumericValue(p.hand.Sand);
        const v2 = cardNumericValue(p.hand.Blood);
        const total = v1 + v2;
        return { player: p, total };
      });

      results.forEach(r => {
        log(`${r.player.name} total = ${r.total}`);
      });

      // find best (closest to 0)
      let best = null;
      results.forEach(r => {
        if (!best || Math.abs(r.total) < Math.abs(best.total)) best = r;
      });

      // check ties
      const winners = results.filter(r => Math.abs(r.total) === Math.abs(best.total));
      if (winners.length > 1) {
        log("Tie! Winners get their chips back; others pay penalties.");
      } else {
        log(`Winner: ${winners[0].player.name}`);
      }

      // chip penalties (simplified)
      results.forEach(r => {
        const p = r.player;
        if (winners.some(w => w.player === p)) {
          // winner gets invested chips back – in this prototype we skip tracking per-round pot
          log(`${p.name} keeps their chips.`);
        } else {
          // taxed 1 chip for losing sabacc hand
          if (p.chips > 0) {
            p.chips -= 1;
            log(`${p.name} loses 1 chip.`);
          }
          if (p.chips <= 0) {
            p.busted = true;
            log(`${p.name} is out of chips and out of the game.`);
          }
        }
      });

      // check game over
      const activePlayers = players.filter(p => !p.busted);
      if (activePlayers.length <= 1) {
        gameActive = false;
        drawBtn.disabled = true;
        standBtn.disabled = true;
        revealBtn.disabled = true;
        if (activePlayers.length === 1) {
          log(`Game over! ${activePlayers[0].name} wins the pot.`);
        } else {
          log("Game over! No players left with chips.");
        }
      } else {
        // new round
        players.forEach(p => { p.stood = false; });
        currentTurn = 1;
        currentPlayerIndex = 0;
        dealInitialHands();
        drawBtn.disabled = false;
        standBtn.disabled = false;
        revealBtn.disabled = true;
        log("New round begins.");
      }
      updateStatus();
    }

    function cardNumericValue(card) {
      if (!card) return 0;
      if (card.type === "number") return card.value;
      if (card.type === SPECIAL_SYLOP) {
        // Sylop matches the other card; here we just treat as same as other family
        return 0; // neutral in this simple prototype
      }
      return 0;
    }

    // --- Event Listeners ---
    document.getElementById("startGame").addEventListener("click", startGame);
    drawBtn.addEventListener("click", () => gameActive && onDraw());
    standBtn.addEventListener("click", () => gameActive && onStand());
    revealBtn.addEventListener("click", () => gameActive && onReveal());
  </script>
</body>
</html>
