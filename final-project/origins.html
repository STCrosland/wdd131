<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mythical creatures sorted by origin">
    <meta name="author" content="Spencer T. Crosland">

    <title>Mythical Index - Origins</title>

    <link rel="stylesheet" href="mythical-index.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script defer src="mythical-index.js"></script>
    <link rel="icon" type="image/jpeg" href="images/mythical-index-logo.jpg">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/mythical-index-logo.jpg" alt="Mythical Index Logo">
        <span>Mythical Index</span>
    </div>

    <nav>
        <a href="mythical-home.html">Home</a>
        <a href="creatures.html">Creatures</a>
        <a href="origins.html" class="active">Origins</a>
    </nav>
</header>

<main class="container">

<section class="controls">
    <h1>Origins</h1>
    <select id="origin-select">
        <option value="">Select an origin...</option>
        <option value="Norse">Norse</option>
        <option value="Greek">Greek</option>
        <option value="Native American">Native American</option>
    </select>
</section>

<div id="origins-grid" class="card-grid"></div>

<aside id="origin-detail" class="detail-panel hidden">
    <button id="close-origin-detail" class="close-btn">×</button>

    <h2 id="origin-detail-name"></h2>
    <img id="origin-detail-image" alt="">

    <h3>Origin</h3>
    <p id="origin-detail-origin"></p>

    <h3>Description</h3>
    <p id="origin-detail-description"></p>

    <h3>Lore</h3>
    <p id="origin-detail-lore"></p>

    <h3>Abilities</h3>
    <p id="origin-detail-abilities"></p>
</aside>

</main>

<footer>
     <a href="https://stcrosland.github.io/wdd131/" target="_blank">  
            <img src="images/crosland-sheild-logo.jpeg" alt="shelid with read and white cross and crosland banner">
        </a>
    <p>&copy; 2026 Mythical Index</p>
</footer>

</body>
</html>
