<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalog of mythical creatures">
    <meta name="author" content="Spencer T. Crosland">

    <title>Mythical Index - Creatures</title>

    <link rel="stylesheet" href="mythical-index.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script defer src="mythical-index.js"></script>
    <link rel="icon" type="image/jpeg" href="images/mythical-index-logo.jpg">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/mythical-index-logo.jpg" alt="Mythical Index Logo">
        <span>Mythical Index</span>
    </div>

    <nav>
        <a href="mythical-home.html">Home</a>
        <a href="creatures.html" class="active">Creatures</a>
        <a href="origins.html">Origins</a>
    </nav>
</header>

<main class="container">

    <section class="controls">
        <h1>Creatures</h1>
        <div class="filters">
            <input id="search-input" type="text" placeholder="Search creatures...">
        </div>
    </section>

    <div id="creatures-grid" class="card-grid"></div>

    <aside id="creature-detail" class="detail-panel hidden">
        <button id="close-detail" class="close-btn">×</button>

        <h2 id="detail-name"></h2>
        <img id="detail-image" alt="">

        <h3>Origin</h3>
        <p id="detail-origin"></p>

        <h3>Description</h3>
        <p id="detail-description"></p>

        <h3>Lore</h3>
        <p id="detail-lore"></p>

        <h3>Abilities</h3>
        <p id="detail-abilities"></p>
    </aside>

</main>

<footer>
     <a href="https://stcrosland.github.io/wdd131/" target="_blank">  
            <img src="images/crosland-sheild-logo.jpeg" alt="shelid with read and white cross and crosland banner">
        </a>
    <p>&copy; 2026 Mythical Index</p>
</footer>

</body>
</html>
